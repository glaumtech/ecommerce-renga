<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4 py-12">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-100 p-8 box-border overflow-hidden">
    <div class="flex items-center gap-3 mb-6">
      <img
        src="brand-logo.png"
        alt="Sri Renga Pooja & Herbal Traders"
        class="h-16 w-auto object-contain flex-shrink-0"
        width="280"
        height="72"
      />
      <div class="leading-tight min-w-0">
        <span class="block text-base font-serif font-bold text-slate-800 leading-snug">Sri Renga Pooja</span>
        <span class="block text-sm font-medium text-amber-700 leading-snug">& Herbal Traders</span>
      </div>
    </div>
    <h1 class="text-2xl font-serif font-bold text-slate-800 mb-8 text-center">Welcome Back</h1>

    <form [formGroup]="form" (ngSubmit)="submit()" class="w-full max-w-xs mx-auto space-y-4">
      <div class="w-full min-w-0">
        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input
          formControlName="username"
          type="text"
          class="block box-border w-full min-w-0 max-w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-amber-500 outline-none"
        />
      </div>
      <div class="w-full min-w-0">
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <div class="relative w-full min-w-0">
          <input
            formControlName="password"
            [type]="showPassword() ? 'text' : 'password'"
            class="block box-border w-full min-w-0 max-w-full border border-slate-300 rounded-lg px-4 py-2.5 pr-11 focus:ring-2 focus:ring-amber-500 outline-none"
          />
          <button
            type="button"
            (click)="showPassword.set(!showPassword())"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors p-1"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
            [attr.aria-pressed]="showPassword()"
          >
            @if (showPassword()) {
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            }
          </button>
        </div>
      </div>

      @if (error()) {
        <p class="text-sm text-red-600">{{ error() }}</p>
      }

      <button type="submit" [disabled]="loading()" class="w-full bg-amber-600 hover:bg-amber-700 disabled:opacity-60 text-white font-bold py-3 rounded-xl transition-all">
        {{ loading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="text-sm text-center text-slate-500 mt-6">
      Don't have an account?
      <a routerLink="/register" class="text-amber-600 font-medium hover:underline">Create one</a>
    </p>
    <p class="text-sm text-center mt-2">
      <a routerLink="/" class="text-slate-500 hover:text-amber-600">Back to store</a>
    </p>
  </div>
</div>
